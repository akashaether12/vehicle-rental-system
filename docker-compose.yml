version: "3.9"

services:
  app:
    build: .
    container_name: vehicle-rental-system
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/vehicle_rental_system
      JWT_SECRET: change_this_secret
      CLIENT_URL: http://localhost:5000
      ADMIN_EMAIL: admin@velocityrentals.com
      ADMIN_PASSWORD: Admin@123
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: vehicle-rental-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
